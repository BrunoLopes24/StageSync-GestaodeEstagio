services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stagesync
      POSTGRES_USER: stagesync
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stagesync_dev}
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
      target: builder
    working_dir: /app
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx tsx watch src/server.ts"
    environment:
      DATABASE_URL: postgresql://stagesync:${DB_PASSWORD:-stagesync_dev}@db:5432/stagesync
      NODE_ENV: development
      PORT: "3000"
      CORS_ORIGIN: http://localhost:5173
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      APP_URL: ${APP_URL:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-stagesync-dev-access-secret-change-in-prod-min32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-stagesync-dev-refresh-secret-change-in-prod-min32chars}
      ALLOW_FIRST_LOGIN_PASSWORD_SETUP: "true"
      ALLOW_MULTIPLE_SESSIONS: "false"
    ports:
      - "3000:3000"
    volumes:
      - ../backend/src:/app/src
      - ../backend/prisma:/app/prisma
      - ../backend/package.json:/app/package.json
      - ../backend/tsconfig.json:/app/tsconfig.json
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_started

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      target: builder
    working_dir: /app
    command: npx vite --host 0.0.0.0
    environment:
      NODE_ENV: development
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.ts:/app/vite.config.ts
      - ../frontend/tsconfig.json:/app/tsconfig.json
      - ../frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ../frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ../frontend/package.json:/app/package.json
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata-dev:
  backend_node_modules:
  frontend_node_modules:
